<div class="bg-indigo-600 my-12 py-16 px-6 shadow-2xl shadow-indigo-200">
  <div class="max-w-4xl mx-auto">
    <h3 class="text-sm font-bold text-indigo-200 uppercase tracking-widest mb-12">Experience Path</h3>

    <div class="relative border-l-2 border-white/20 ml-4 md:ml-0">
      @for (exp of experiences; track exp.company) {
      <div class="mb-10 ml-8 relative">

        <div
          class="absolute -left-10.5 top-1 w-5 h-5 bg-white border-4 border-indigo-400 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.3)]">
        </div>

        <div
          class="p-6 rounded-2xl bg-white/10 backdrop-blur-md border border-white/10 shadow-xl hover:bg-white/15 transition-all group">

          <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-2">
            <div>
              <h4 class="text-xl font-bold text-white">{{ exp.role }}</h4>
              <p class="text-indigo-200 font-semibold">{{ exp.company }}</p>
            </div>
            <span class="px-4 py-1 bg-white text-indigo-700 text-sm font-bold rounded-full w-fit">
              {{ exp.period }}
            </span>
          </div>

          <p class="text-indigo-50 leading-relaxed mb-6">
            {{ exp.description }}
          </p>

          <div class="flex flex-wrap gap-2">
            @for (tech of exp.technologies; track tech) {
            <span
              class="text-xs font-medium px-2.5 py-0.5 rounded bg-white/10 text-white border border-white/20 group-hover:border-white/40">
              {{ tech }}
            </span>
            }
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
