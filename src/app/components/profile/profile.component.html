<div class="max-w-6xl mx-auto py-16 px-6">
  <div class="flex flex-col md:flex-row gap-12 items-start">
    <div class="w-full md:w-72 shrink-0">
      <div
        class="w-48 h-48 md:w-64 md:h-64 bg-indigo-100 rounded-2xl overflow-hidden border-4 border-white shadow-xl mb-8">
        <img src="{{ profilePicture }}" alt="Profile Picture" class="w-full h-full object-cover">
      </div>

      <div class="space-y-4">
        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Contact Info</h3>

        @for (item of contactLinks; track item.label) {
        <a [href]="item.link" [target]="item.isExternal ? '_blank' : '_self'" class="flex items-center group">

          <div
            class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-colors mr-3">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path [attr.d]="item.icon"></path>
            </svg>
          </div>

          <span class="text-slate-600 text-sm font-medium group-hover:text-indigo-600 transition-colors">
            {{ item.label }}
          </span>
        </a>
        }
      </div>
    </div>

    <div class="flex-1 pt-4">
      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-6">
        Hi, I'm <span class="text-indigo-600">{{ fullName }}</span>
      </h1>
      <h2 class="text-xl font-semibold text-slate-500 mb-8 tracking-wide uppercase">
        {{ role }}
      </h2>

      <div class="prose prose-indigo text-slate-600 text-lg leading-relaxed space-y-6 max-w-3xl">
        @for (paragraph of aboutMe; track $index) {
        <p>{{ paragraph }}</p>
        }
      </div>

      <div class="mt-10 flex flex-wrap gap-4">
        <button
          class="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">
          Download Resume
        </button>
      </div>
    </div>
  </div>

  <hr class="my-20 border-slate-100">

  <div class="flex flex-col md:flex-row gap-12 items-start">
    <div class="w-full md:w-72 shrink-0">
      <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Technical Skills</h3>
    </div>

    <div class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (skill of skills; track skill.title) {
      <div
        class="p-6 rounded-2xl bg-white border border-slate-100 shadow-sm hover:border-indigo-200 transition-all group">
        <div
          class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600 mb-4 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="skill.iconPath" />
          </svg>
        </div>
        <h4 class="font-bold text-slate-900 mb-2">{{ skill.title }}</h4>
        <p class="text-slate-500 text-sm leading-relaxed">{{ skill.description }}</p>
      </div>
      }
    </div>
  </div>
</div>
