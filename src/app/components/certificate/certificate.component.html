<div class="bg-slate-50 rounded-3xl my-12 py-16 px-6">
  <div class="max-w-6xl mx-auto">
    <div class="mb-10">
      <h3 class="text-sm font-bold text-indigo-600 uppercase tracking-widest mb-2 text-center md:text-left">
        Credentials
      </h3>
      <h2 class="text-3xl font-extrabold text-slate-900 text-center md:text-left">
        Certificates & Achievements
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (cert of certificates; track $index) {
      <div (click)="openModal(cert.image)"
        class="group cursor-pointer relative overflow-hidden rounded-2xl bg-white border border-slate-200 shadow-sm transition-all hover:shadow-md hover:-translate-y-1">

        <div class="aspect-4/3 overflow-hidden bg-slate-100">
          <img [src]="cert.image" [alt]="cert.title"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">

          <div
            class="absolute inset-0 bg-indigo-600/10 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-4 backdrop-blur-[1px]">
            <span
              class="text-indigo-700 text-xs font-bold bg-white/90 px-4 py-2 rounded-full shadow-sm border border-indigo-100">
              View Full Certificate
            </span>
          </div>
        </div>

        <div class="p-5 border-t border-slate-100">
          <p class="text-slate-600 text-[10px] font-bold uppercase tracking-wider leading-relaxed">
            {{ cert.title }}
          </p>
        </div>
      </div>
      }
    </div>
  </div>
</div>

@if (selectedImg) {
<div
  class="fixed inset-0 z-100 flex items-center justify-center bg-slate-900/95 backdrop-blur-sm p-4 md:p-10 animate-in fade-in duration-300"
  (click)="closeModal()">

  <div class="absolute top-5 right-5 flex items-center gap-3">
    <button class="text-white text-4xl hover:scale-110 transition-transform leading-none">&times;</button>
  </div>

  <div class="relative max-w-5xl w-full h-full flex items-center justify-center" (click)="$event.stopPropagation()">
    <img [src]="selectedImg"
      class="max-w-full max-h-full object-contain rounded-lg shadow-2xl animate-in zoom-in-95 duration-300">
  </div>
</div>
}
